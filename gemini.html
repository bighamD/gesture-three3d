<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web 3D 手势粒子倒计时</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #050505;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
    }

    #webgl-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #video-container {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 240px;
      height: 180px;
      border: 2px solid #00ffcc;
      border-radius: 8px;
      overflow: hidden;
      z-index: 10;
      box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
      transform: scaleX(-1);
      /* 镜像显示方便用户对应 */
    }

    #webcam {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      z-index: 20;
      text-shadow: 0 0 10px #00ffcc;
    }

    #debug-info {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      font-size: 18px;
      color: #00ffcc;
      pointer-events: none;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>

<body>

  <div id="loading">正在加载模型与摄像头，请稍候...</div>
  <div id="debug-info">识别数字: -</div>

  <div id="video-container">
    <video id="webcam" autoplay playsinline></video>
  </div>
  <canvas id="webgl-canvas"></canvas>

  <script>
    // ==========================================
    // 1. Three.js 粒子系统设置
    // ==========================================
    const canvas = document.getElementById('webgl-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 150;

    const PARTICLE_COUNT = 4000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const targetPositions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);

    // 初始化粒子位置（随机散落）
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      positions[i * 3] = (Math.random() - 0.5) * 300;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 300;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 300;

      targetPositions[i * 3] = positions[i * 3];
      targetPositions[i * 3 + 1] = positions[i * 3 + 1];
      targetPositions[i * 3 + 2] = positions[i * 3 + 2];

      // 粒子颜色：青蓝色科技感
      colors[i * 3] = 0.0;     // R
      colors[i * 3 + 1] = 1.0; // G
      colors[i * 3 + 2] = 0.8; // B
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 1.5,
      vertexColors: true,
      blending: THREE.AdditiveBlending,
      transparent: true,
      opacity: 0.8,
      depthWrite: false
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // 窗口缩放适配
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // 动画循环
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const positions = geometry.attributes.position.array;

      // 简单的插值动画，让粒子飞向目标位置
      for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
        positions[i] += (targetPositions[i] - positions[i]) * 0.08;
      }

      // 整体缓慢旋转增加立体感
      particles.rotation.y = Math.sin(clock.getElapsedTime() * 0.5) * 0.2;
      particles.rotation.x = Math.cos(clock.getElapsedTime() * 0.3) * 0.1;

      geometry.attributes.position.needsUpdate = true;
      renderer.render(scene, camera);
    }
    animate();

    // ==========================================
    // 2. 利用 2D Canvas 获取文字像素坐标
    // ==========================================
    const textCanvas = document.createElement('canvas');
    textCanvas.width = 120;
    textCanvas.height = 120;
    const ctx = textCanvas.getContext('2d', { willReadFrequently: true });

    function updateParticlesToNumber(numStr) {
      ctx.clearRect(0, 0, textCanvas.width, textCanvas.height);
      ctx.fillStyle = 'white';
      ctx.font = 'bold 100px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(numStr, textCanvas.width / 2, textCanvas.height / 2);

      const imgData = ctx.getImageData(0, 0, textCanvas.width, textCanvas.height).data;
      const points = [];

      // 遍历像素，提取非透明像素的坐标
      for (let y = 0; y < textCanvas.height; y += 2) {
        for (let x = 0; x < textCanvas.width; x += 2) {
          const alpha = imgData[(y * textCanvas.width + x) * 4 + 3];
          if (alpha > 128) {
            points.push({
              x: (x - textCanvas.width / 2) * 1.5, // 放大系数
              y: -(y - textCanvas.height / 2) * 1.5, // Three.js Y轴向上，Canvas Y轴向下
              z: (Math.random() - 0.5) * 10 // 给文字增加一点厚度
            });
          }
        }
      }

      // 更新目标坐标数组
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        if (i < points.length) {
          targetPositions[i * 3] = points[i].x;
          targetPositions[i * 3 + 1] = points[i].y;
          targetPositions[i * 3 + 2] = points[i].z;
        } else {
          // 多余的粒子随机散落在背景中
          targetPositions[i * 3] = (Math.random() - 0.5) * 400;
          targetPositions[i * 3 + 1] = (Math.random() - 0.5) * 400;
          targetPositions[i * 3 + 2] = (Math.random() - 0.5) * 400;
        }
      }
    }

    // 初始化显示 0
    let currentNumber = -1;

    // ==========================================
    // 3. MediaPipe 手势识别逻辑
    // ==========================================
    const videoElement = document.getElementById('webcam');
    const debugInfo = document.getElementById('debug-info');

    function countFingers(landmarks) {
      let count = 0;
      // 判断手指是否伸直的基本逻辑：指尖的 Y 坐标是否小于（高于）第二关节的 Y 坐标

      // 拇指：逻辑与其它手指不同，由于关节角度，主要比较 X 轴或距离
      // 这里用拇指指尖(4)和食指根部(5)的距离作为简化判断
      const thumbTip = landmarks[4];
      const thumbBase = landmarks[2];
      const isThumbOut = Math.abs(thumbTip.x - thumbBase.x) > 0.05;
      if (isThumbOut) count++;

      // 食指 (8 tip, 6 PIP)
      if (landmarks[8].y < landmarks[6].y) count++;
      // 中指 (12 tip, 10 PIP)
      if (landmarks[12].y < landmarks[10].y) count++;
      // 无名指 (16 tip, 14 PIP)
      if (landmarks[16].y < landmarks[14].y) count++;
      // 小指 (20 tip, 18 PIP)
      if (landmarks[20].y < landmarks[18].y) count++;

      return Math.min(count, 5); // 确保最多返回 5
    }

    function onResults(results) {
      // 隐藏加载提示
      document.getElementById('loading').style.display = 'none';

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        // 取第一只手
        const landmarks = results.multiHandLandmarks[0];
        const fingers = countFingers(landmarks);

        debugInfo.innerText = `识别数字: ${fingers}`;

        // 如果数字发生变化，更新粒子
        if (fingers !== currentNumber) {
          currentNumber = fingers;
          updateParticlesToNumber(fingers.toString());
        }
      } else {
        debugInfo.innerText = `识别数字: 未检测到手`;
        if (currentNumber !== -1) {
          currentNumber = -1;
          updateParticlesToNumber("?"); // 没手的时候显示问号
        }
      }
    }

    const hands = new Hands({
      locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
      }
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.6
    });

    hands.onResults(onResults);

    const cameraFeed = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({ image: videoElement });
      },
      width: 640,
      height: 480
    });

    cameraFeed.start();

  </script>
</body>

</html>
